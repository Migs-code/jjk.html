<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="valentine.css">
</head>
<body>
    <div class="container">
        <img src="123.gif" alt="Cute Bears">
        <h1>Kiss ko bi
        </h1>
        <div class="buttons">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>


    <script>
      const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');

let clicks = 0;

// List of phrases for the No button
const phrases = [
    "No",
    "kiss ko baaa",
    "Laina...",
    "adtoon gyud tika",
    "Luod ka noh?",
    "Iloveyou jannah HAHAH",
    "Ayna pang luod ha?"
];

noBtn.addEventListener('click', () => {
    clicks++;

    // 1. Cycle through the phrases
    // If we run out of phrases, it will stay on the last one
    const phraseIndex = Math.min(clicks, phrases.length - 1);
    noBtn.innerText = phrases[phraseIndex];

    // 2. Make the YES button grow
    const yesScale = 1 + (clicks * 0.6); 
    yesBtn.style.transform = `scale(${yesScale})`;

    // 3. Move the NO button to a random spot
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.position = 'absolute'; 
    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
});

yesBtn.addEventListener('click', () => {
    alert('Yay! Iloveyousomuch');
});
    </script>
</body>
</html>
